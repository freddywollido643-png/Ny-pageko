<!DOCTYPE html>
<html>
<head>
    <title>Pejy Faharoa - Vidéo sy Audio</title>
    <style>
        body { 
            background-color: #FFB6C1; 
            text-align: center; 
            font-family: sans-serif;
            padding-top: 30px;
            padding-bottom: 50px;
        }
        h1 { color: #8B0000; }
        h2 { 
            color: #8B0000; 
            font-size: 18px;
            margin-top: 30px;
        }
        video {
            margin-top: 10px;
            max-width: 90%;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }
        audio {
            margin-top: 10px;
            width: 90%;
            max-width: 400px;
        }
        a {
            display: inline-block;
            margin-top: 40px;
            color: white;
            background-color: #8B0000;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Ny Horonantsariko sy ny Hirako</h1>
    
    <p>Ity ilay vidéo ao anaty finday:</p>
    <!-- 🎬 Maka an'ilay video.mp4 eo akaikiny -->
    <video controls>
        <source src="video.mp4" type="video/mp4">
    </video>

    <!-- 🎵 Maka an'ilay hira.mp3 eo akaikiny -->
    <h2>Ity kosa ilay hira:</h2>
    <audio controls>
        <source src="hira.mp3" type="audio/mpeg">
    </audio>

    <br>

    <a href="index.html">Hiverina any amin'ny Pejy Voalohany</a>

</body>
</html>
