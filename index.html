<!DOCTYPE html>
<html>
<head>
    <title>Lalao Quiz - Pejy Voalohany</title>
    <style>
        body { 
            background-color: #87CEEB; 
            text-align: center; 
            font-family: sans-serif;
            padding-top: 30px;
            padding-bottom: 50px;
        }
        h1 { color: #00008b; }
        
        /* 🎮 Haingo ho an'ilay boaty Quiz */
        .quiz-container {
            background-color: white;
            max-width: 450px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            text-align: left;
        }

        .fanontaniana {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        /* Ny bokotra hisafidianana valiny */
        .safidy {
            display: block;
            width: 100%;
            background-color: #f0f0f0;
            color: #333;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }

        .safidy:hover {
            background-color: #e0e0e0;
            border-color: #00008b;
        }

        /* Boaty fampisehoana valiny */
        #vokatra {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
            color: #00008b;
        }

        .rohy-pejy2 {
            display: inline-block;
            margin-top: 20px;
            color: white;
            background-color: #00008b;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Lalao Quiz Laharan'ny 1</h1>
    <p>Andramo valiana ity fanontaniana tsotra ity mba hitsapana ny fahaizanao!</p>

    <!-- 🎮 BOATY MISY ILAY LALAO -->
    <div class="quiz-container">
        <div class="fanontaniana">Inona no renivohitr'i Madagasikara?</div>
        
        <!-- Ireo bokotra azo tsindrina -->
        <button class="safidy" onclick="tsekoValiny(false)">A) Mahajanga</button>
        <button class="safidy" onclick="tsekoValiny(true)">B) Antananarivo</button>
        <button class="safidy" onclick="tsekoValiny(false)">C) Toamasina</button>

        <!-- Toerana hisehoan'ny hoe Marina sa Diso -->
        <div id="vokatra"></div>
    </div>

    <!-- 🧠 CODE JAVASCRIPT MPIFEHY NY LALAO -->
    <script>
        function tsekoValiny(marina) {
            let toeranaVokatra = document.getElementById("vokatra");
            if (marina === true) {
                toeranaVokatra.innerHTML = "🎉 Marina izany! Lasa ianao!";
                toeranaVokatra.style.color = "green";
            } else {
                toeranaVokatra.innerHTML = "❌ Diso izany! Andramo indray.";
                toeranaVokatra.style.color = "red";
            }
        }
    </script>

    <br>
    <a href="pejy2.html" class="rohy-pejy2">Handeha hijery ny Vidéo sy Hira ➡️</a>

</body>
</html>
